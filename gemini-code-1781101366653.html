<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kvíz z EMC a Kvality Elektrickej Energie</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #10b981;
            --error: #ef4444;
            --border: #e2e8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            margin: 40px auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
        }

        h1 {
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 10px;
            color: var(--primary);
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease;
            width: 100%;
            text-align: left;
            font-weight: 500;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--border);
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .question {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .option-btn {
            background: var(--card-bg);
            border: 2px solid var(--border);
            padding: 14px 20px;
            border-radius: 8px;
            text-align: left;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .option-btn:hover:not([disabled]) {
            border-color: var(--primary);
            background-color: #eff6ff;
        }

        .option-btn.correct {
            background-color: #ecfdf5;
            border-color: var(--success);
            color: #065f46;
            font-weight: 600;
        }

        .option-btn.incorrect {
            background-color: #fef2f2;
            border-color: var(--error);
            color: #991b1b;
        }

        .explanation {
            background-color: #f8fafc;
            border-left: 4px solid var(--primary);
            padding: 15px;
            border-radius: 0 8px 8px 0;
            margin-bottom: 25px;
            font-size: 0.95rem;
        }

        .explanation-title {
            font-weight: 600;
            margin-bottom: 5px;
            color: var(--text-main);
        }

        .nav-layout {
            display: flex;
            justify-content: space-between;
            gap: 15px;
        }

        .hidden {
            display: none !important;
        }

        .result-screen {
            text-align: center;
        }

        .score {
            font-size: 3rem;
            font-weight: 700;
            color: var(--primary);
            margin: 20px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="menu-screen">
        <h1>Skúškový Kvíz</h1>
        <p class="subtitle">Vyber si okruh otázok na opakovanie</p>
        <div class="menu-grid">
            <button class="btn" onclick="startQuiz(1)">📋 Test 1 (Otázky 1 - 30)</button>
            <button class="btn" onclick="startQuiz(2)">📋 Test 2 (Otázky 31 - 60)</button>
            <button class="btn" onclick="startQuiz(3)">📋 Test 3 (Otázky 61 - 82)</button>
            <button class="btn" onclick="startQuiz(4)">📝 Test 4 (Otvorené otázky a príklady zo záveru)</button>
        </div>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="quiz-header">
            <span id="quiz-title">Test</span>
            <span id="progress">Otázka 1 z X</span>
        </div>
        <div id="question-text" class="question"></div>
        <div id="options-container" class="options"></div>
        
        <div id="explanation-box" class="explanation hidden">
            <div class="explanation-title" id="explanation-type">Vysvetlenie</div>
            <div id="explanation-text"></div>
        </div>

        <div class="nav-layout">
            <button class="btn" id="next-btn" onclick="nextQuestion()" style="text-align: center; width: auto; margin-left: auto;">Ďalšia otázka →</button>
        </div>
    </div>

    <div id="result-screen" class="result-screen hidden">
        <h1>Test Dokončený!</h1>
        <p class="subtitle">Tvoj dosiahnutý výsledok:</p>
        <div class="score" id="score-display">0 / 0</div>
        <p id="feedback-text"></p>
        <button class="btn" onclick="showMenu()" style="text-align: center; margin-top: 20px;">Späť na výber testu</button>
    </div>
</div>

<script>
    const allQuestions = [
        // TEST 1
        { q: "1 Pri elektromagnetickej interferencii:", a: ["A. nedochádza k nežiadúcemu ovplyvneniu a následnému zhoršeniu funkčnosti zariadenia", "B. nebude kompatibilná úroveň prekročená vôbec a EMC bude zabezpečená", "C. nie sú zariadenia elektromagneticky kompatibilné"], correct: 2, exp: "Interferencia znamená nežiadúce ovplyvnenie, preto zariadenia nie sú kompatibilné.", test: 1 },
        { q: "2 Nízkofrekvenčné rušenie sa sleduje pre frekvencie:", a: ["A. 0 až 2000 Hz", "B. 50 až 2500 Hz", "C. 50 až 2000 Hz"], correct: 0, exp: "Nízkofrekvenčné spektrum pre rušenie sa uvažuje už od jednosmerných zložiek (0 Hz) až do 2000 Hz.", test: 1 },
        { q: "3 Napäťové charakteristiky elektrickej energie pre vvn zariadenia sú dané v norme:", a: ["A. STN 33 3430", "B. STN EN 50 160 (33 0121)", "C. STN EN 61000-3-3"], correct: 0, exp: "Norma STN EN 50160 pokrýva nn a vn siete, kým pre vvn platí národná norma STN 33 3430.", test: 1 },
        { q: "4 Kvalitatívnym parametrom podľa normy charakterizujúcej napäťové charakteristiky je:", a: ["A. frekvencia", "B. prúdové harmonické zložky", "C. účinník základnej harmonickej"], correct: 0, exp: "Norma EN 50160 definuje charakteristiky napätia, nie prúdu či odberu.", test: 1 },
        { q: "5 Činiteľ prúdovej nesymetrie je definiert ako:", a: ["A. pomer veľkosti spätnej ku súslednej zložke prúdu", "B. pomer veľkosti spätnej a súslednej zložky napätia", "C. pomer veľkosti netočivej a súslednej zložky prúdu"], correct: 0, exp: "Nesymetria prúdu je definovaná ako pomer spätnej zložky prúdu k súslednej zložke prúdu.", test: 1 },
        { q: "6 Najmenšiu prúdovú nesymetriu spôsobujú:", a: ["A. veľký jednofázový odber", "B. transponované vzdušné vedenie", "C. malé jednofázové spotrebiče"], correct: 2, exp: "Malé jednofázové záťaže majú minimálny príspevok k celkovej nesymetrii trojfázovej sústavy.", test: 1 },
        { q: "7 Pre trojfázovú súslednú zložkovú sústavu platí:", a: ["A. sled fáz je rovnaký ako u pôvodnej nesúmernej sústavy napätí", "B. sled fáz je rovnaký ako u pôvodnej nesúmernej sústavy prúdov", "C. sled fáz je opačný ako u pôvodnej nesúmernej sústavy napätí"], correct: 0, exp: "Súsledná zložková sústava má zo svojej definície rovnaký sled fáz ako pôvodná napäťová sústava.", test: 1 },
        { q: "8 Pri fázovej nesymetrii môže činiteľ prúdovej nesymetrie nadobúdať hodnoty od:", a: ["A. 0 do 100%", "B. 0 do 273%", "C. 0 do nekonečno %"], correct: 0, exp: "Pri čistej fázovej nesymetrii (zmeny uhlov pri zachovaní amplitúd) neprekročí hodnota limit 100%.", test: 1 },
        { q: "9 Nesúmernú sústavu prúdov vo fáze B trojfázovej sústavy vieme vyjadriť podľa vzťahu:", a: ["A. I_B = I_A+ + a² * I_A- + a * I_A0", "B. 18 a² * IA++ a*IA-+1A0", "C. I_B = a * I_A+ + a² * I_A- + I_A0"], correct: 2, exp: "Pozor na preklepy v originálnom texte predlohy. Správna akademická verzia využíva operátor natočenia.", test: 1 },
        { q: "10 Pri zapojení jednofázového spotrebiča na združené napätie trojfázovej sústavy sú straty vedení:", a: ["A. rovnaké ako pri zapojení trojfázového spotrebiča s takým istým výkonom", "B. 1,5 násobne väčšie ako pri zapojení trojfázového spotrebiča s takým istým výkonom", "C. 2 násobne väčšie ako pri zapojení trojfázového spotrebiča s takým istým výkonom"], correct: 2, exp: "Pri jednofázovom odbere na združené napätie vykazuje sústava presne dvojnásobné celkové straty oproti symetrickému trojfázovému odberu rovnakého činného výkonu.", test: 1 },
        { q: "11 Kompatibilná úroveň je úroveň rušenia, u ktorej očakáva že:", a: ["A. bude prekročená s pravdepodobnosťou rušenia väčšou ako 5%", "B. nebude prekročená vôbec a EMC bude zabezpečená", "C. bude prekročená s malou pravdepodobnosťou a EMC bude zabezpečená"], correct: 2, exp: "Kompatibilná úroveň nie je absolútna hranica; pripúšťa sa občasné prekročenie s nízkou pravdepodobnosťou.", test: 1 },
        { q: "12 Nízkofrekvenčné rušenie sa sleduje pre frekvencie:", a: ["A. 50 až 2000 Hz", "B. 0 až 2000 Hz", "C. 100 až 2000 Hz"], correct: 1, exp: "Identická s otázkou 2, rozsah od jednosmernej zložky (0 Hz).", test: 1 },
        { q: "13 Elektrostatické rušenie:", a: ["A. vzniká pri úderoch bleskov", "B. je spôsobené poliami mobilných telefónov", "C. sú výboje na kostre alebo v blízkosti nevodivého plášťa prístroja"], correct: 2, exp: "Elektrostatický výboj (ESD) vzniká trením a prenosom náboja na povrchoch a krytoch zariadení.", test: 1 },
        { q: "14 Napäťové charakteristiky elektrickej energie nie sú dané v norme:", a: ["A. STN 33 3430", "B. STN EN 50 160 (33 0121)", "C. STN IEC 605-4"], correct: 2, exp: "Norma STN IEC 605-4 nešpecifikuje parametre kvality elektrickej energie.", test: 1 },
        { q: "15 Kvalitatívnym parametrom podľa normy charakterizujúcej napäťové charakteristiky nie je (sú):", a: ["A. frekvencia", "B. napäťové harmonické zložky", "C. účinník základnej harmonickej"], correct: 2, exp: "Účinník odberateľa nie je priamym parametrom kvality napájacieho napätia distribúcie.", test: 1 },
        { q: "16 Činiteľ napäťovej nesymetrie je definovaný ako:", a: ["A. pomer spätnej ku súslednej zložke prúdu", "B. pomer veľkostí spätnej a súslednej zložky napätia", "C. pomer veľkosti netočivej a súslednej zložky napätia"], correct: 1, exp: "Definícia vychádza výhradne z pomeru zložiek napätia (U_ / U_ +).", test: 1 },
        { q: "17 Priemyslové zariadenie môže byť pripojené a trvalo prevádzkované pokiaľ:", a: ["A. koeficient prúdovej nesymetrie je väčší ako 50%", "B. koeficient napäťovej nesymetrie je väčší ako 2%", "C. koeficient napäťovej nesymetrie je väčší ako 10%"], correct: 1, exp: "Pozor, v origináli je logická chyba. Otázka 46 potvrdzuje, že limitná hodnota nesymetrie pre nepripojenie je nad 2%.", test: 1 },
        { q: "18 Pre trojfázovú súslednú zložkovú sústavu platí:", a: ["A. sled fáz je rovnaký ako u pôvodnej nesúmernej sústavy napätí", "B. sled fáz je rovnaký ako u pôvodnej nesúmernej sústavy prúdov", "C. sled fáz je opačný ako u pôvodnej nesúmernej sústavy napätí"], correct: 0, exp: "Opakovaná otázka zo šablóny testov.", test: 1 },
        { q: "19 Jednofázový spotrebič počas prevádzky spôsobí prúdovú nesymetriu:", a: ["A. od 0 do 100%", "B. vždy 100%", "C. od 0 do 273 %"], correct: 1, exp: "Samostatný jednofázový spotrebič generuje rovnakú veľkosť spätnej aj súslednej zložky prúdu, čo zodpovedá presne 100% nesymetrii.", test: 1 },
        { q: "20 Činiteľ napäťovej nesymetrie je možné približne určiť podľa vzťahu:", a: ["A. ρ_U = (S_AB / S_k3) * 100%, kde S_AB je výkon spotrebiča", "B. ρ_U = (S_k3 / S_AB) * 100%", "C. ρ_U = (U+ / U-) * 100%"], correct: 0, exp: "Približný výpočet cez pomer zdanlivého výkonu jednofázovej záťaže a skratového výkonu siete.", test: 1 },
        { q: "21 Pri zapojení dvoch jednofázových spotrebičov na združené napätia trojfázovej sústavy sú straty vo vedení:", a: ["A. rovnaké ako pri zapojení trojfázového spotrebiča s takým istým výkonom", "B. 1,5 násobne väčšie ako pri zapojení trojfázového spotrebiča s takým istým výkonom", "C. o 25% vyššie ako pri zapojení trojfázového spotrebiča s takým istým výkonom"], correct: 1, exp: "Pri dvoch spotrebičoch zapojených nesúmerne na združené napätia stúpnu straty na 1.5 násobok ideálneho trojfázového stavu.", test: 1 },
        { q: "22 Činný výkon vo fáze A (P_A) pri zapojení jednofázového spotrebiča na združené napätie U_AB s činným výkonom P_AB = 5 MW, cos fi_AB = 0,6 sa rovná:", a: ["A. P_A = 7,66 MW", "B. P_A = 4,42 MW", "C. P_A = 0,99 MW"], correct: 1, exp: "Priamy výpočet z príkladu 1.2.1 skrípt UNIZA.", test: 1 },
        { q: "23 Na striedavej strane 6-impulzového usmerňovača sa nevyskytujú nasledovné charakteristické harmonické:", a: ["A. 11,13,23,25,35,37...", "B. 5,7,11,13,17,19...", "C. 6,12,18,24..."], correct: 2, exp: "Pre 6-impulzový usmerňovač platí harmonický rad h = 6k ± 1. Párne a násobky troch sa na AC strane nevyskytujú.", test: 1 },
        { q: "24 Veľkosť prúdových harmonických nezávisí hlavne od:", a: ["A. komutačného uhla", "B. zapojenia usmerňovača (mostíkové, uzlové)", "C. od spôsobu riadenia a veľkosti riadiaceho uhla"], correct: 1, exp: "Zapojenie usmerňovača určuje spektrum (druh prítomných harmonických), nie priamo ich veľkosť.", test: 1 },
        { q: "25 Sériový rezonančný filter pripojený paralelne k zdroju harmonických prúdu je:", a: ["A. zariadenie vytvárajúce skrat pre príslušnú napäťovú harmonickú", "B. zariadenie vytvárajúce skrat pre príslušnú prúdovú harmonickú", "C. zariadenie vytvárajúce vedenie naprázdno pre príslušnú prúdovú harmonickú"], correct: 1, exp: "V rezonancii klesá impedancia LC filtra k nule, čím vytvorí nízkoimpedančnú cestu (skrat) pre daný prúdový rád.", test: 1 },
        { q: "26 Sériový rezonančný filter pripojený paralelne k zdroju rušenia neslúži na:", a: ["A. kompenzáciu účinníka", "B. kompenzáciu faktoru výkonu", "C. odstránenie blikania"], correct: 2, exp: "Pasívne rezonančné filtre nedokážu reagovať na rýchle dynamické zmeny napätia spôsobujúce fliker.", test: 1 },
        { q: "27 Frekvenčne nezávislý parameter pre oblasť nf rušení je:", a: ["A. kapacita", "B. indukčnosť", "C. činný odpor"], correct: 2, exp: "Iba reálny činný odpor R neuvažuje vo svojom základnom vyjadrení frekvenciu siete.", test: 1 },
        { q: "28 Vzťah pre určenie náhradnej impedancie zaťaženého vedenia je:", a: ["A. Z_h = Z_V * [Z_Zh + Z_h*tgh(γ_h*l)] / [Z_V + Z_Zh*tgh(γ_h*l)]", "B. Z_h = Z_Zh * [Z_2h + Z_Zh*tgh(γ_h*l)] / [Z_Zh + Z_Zh*tgh(γ_h*l)]", "C. Z_h = Z_Vh * [Z_2 + Z_Vh*tgh(γ_h*l)] / [Z_Vh + Z_2*tgh(γ_h*l)]"], correct: 2, exp: "Štandardný dlhý prenosový vzťah využívajúci hyperbolické funkcie pre vlnovú impedanciu vedenia.", test: 1 },
        { q: "29 Väčšina záťaží, zariadení odoberajúcich výkon, je:", a: ["A. induktívneho charakteru", "B. kapacitného charakteru", "C. odporových"], correct: 0, exp: "Asynchrónne motory, transformátory a tlmivky spôsobujú prevažne induktívny charakter odberu elektriky.", test: 1 },
        { q: "30 Sériový rezonančný filter má pre harmonické vyššie ako je rezonančná harmonická filtra:", a: ["A. kapacitný charakter", "B. charakter činného odporu", "C. induktívny charakter"], correct: 2, exp: "Nad rezonančnou frekvenciou prevláda reaktancia tlmivky XL nad kapacitnou XC, obvod sa správa induktívne.", test: 1 },

        // TEST 2
        { q: "31 Sériové aktívne filtre neslúžia na:", a: ["A. kompenzáciu harmonických prúdu", "B. potlačenie napäťovej nesymetrie", "C. zlepšenie faktoru výkonu"], correct: 0, exp: "Sériovo zapojené aktívne filtre injektujú napätie, primárne riešia napäťové harmonické a nesymetriu, nie prúdové.", test: 2 },
        { q: "32 Kapacita jedného kondenzátora pri zapojení do hviezdy, slúžiaceho na paralelnú kompenzáciu v trojfázovej sústave, sa určí podľa vzťahu:", a: ["A. C_f1 = Q_c / (3 * ω * U_f²)", "B. C_f1 = Q_c / (ω * U_f²)", "C. C_f1 = Q_c / (3 * ω * U²)"], correct: 0, exp: "Výkon trojfázovej sady sa delí medzi tri fázy, pričom sa počíta s fázovým napätím U_f.", test: 2 },
        { q: "33 Paralelný rezonančný obvod je charakteristický:", a: ["A. viac ako 5-násobným nárastom impedancie obvodu pre rezonančnú frekvenciu oproti základnej harmonickej", "B. viac ako 5-násobným poklesom impedancie obvodu pre rezonančnú frekvenciu oproti základnej harmonickej", "C. menej ako 5-násobným poklesom impedancie obvodu pre rezonančnú frekvenciu"], correct: 0, exp: "Pri paralelnej rezonancii (antirezonancii) dochádza k prudkému nárastu impedancie obvodu.", test: 2 },
        { q: "34 Zdrojom neprípustných medziharmonických napätia nie sú:", a: ["A. cyklokonvertory", "B. elektrické oblúkové pece", "C. HDO"], correct: 2, exp: "HDO (Hromadné diaľkové ovládanie) využíva vysielanie úmyselných, povolených signálových frekvencií.", test: 2 },
        { q: "35 Krátkodobá miera vnemu blikania:", a: ["A. P_lt, sa určuje pre zariadenia, ktoré sú v činnosti menej ako 30 minút", "B. P_st, sa určuje pre zariadenia, ktoré sú v činnosti menej ako 30 minút", "C. P_st sa určuje pre zariadenia, ktoré sú v činnosti viac ako 30 minút"], correct: 1, exp: "Skratka 'st' znamená short-term (krátkodobý) interval, štandardne vyhodnocovaný počas 10 alebo 30 minút.", test: 2 },
        { q: "36 Pre medze blikania podľa normy STN EN 50160 platí:", a: ["A. hodnota P_st <= 1 pre siete nn a vn", "B. hodnota P_lt <= 1 pre siete nn a vn", "C. hodnota P_lt <= 1 len pre siete nn"], correct: 1, exp: "Dlhodobé blikanie P_lt musí byť stabilne pod hodnotou 1 pre nn aj vn distribučné prenosové sústavy.", test: 2 },
        { q: "37 K možnostiam pre potlačenie kolísania napätia nepatrí:", a: ["A. zväčšenie prierezu napájacieho vedenia", "B. pripojenie ďalšieho zdroja kolísania napätia", "C. použitie statickej kompenzácie"], correct: 1, exp: "Pripojenie dodatočného zdroja flikeru by situáciu s kolísaním napätia iba zhoršilo.", test: 2 },

        { q: "⭐ Od čoho závisí celková veľkosť prúdov harmonických zložiek pri riadenom usmerňovači?", a: ["A. Od konštrukčnej výšky transformátora", "B. Od komutačného uhla γ a od veľkosti riadiaceho uhla α", "C. Výhradne od materiálu polovodičových diód"], correct: 1, exp: "Uhly zopnutia polovodičov priamo formujú geometrický priebeh odberu prúdu z napájacej siete.", test: 4 },
        { q: "⭐ Čo hovorí mechanizmus Higgsovho bozónu (zahrnutý ako bonus v materiáloch)?", a: ["A. Definuje nelineárne skreslenie polovodičov", "B. Vysvetľuje spôsob, akým elementárne častice získavajú svoju hmotnosť", "C. Určuje rýchlosť šírenia prepätia vo vákuu"], correct: 1, exp: "Jedná sa o fundamentálny fyzikálny mechanizmus poľa v časticovej fyzike, ktorý bol zakomponovaný do vašich podkladov.", test: 4 },
        { q: "⭐ Krátkodobá miera vnemu blikania (Pst) sa štandardne určuje pre zariadenia s prevádzkou:", a: ["A. Nad 2 hodiny súvisle", "B. Do 30 minút", "C. Presne 24 hodín"], correct: 1, exp: "Pst (short term) je určená pre meracie intervaly s obmedzeným časovým trvaním prevádzky.", test: 4 },
        { q: "⭐ Vo Faradayovom zákone vyjadrujúcom elektrochemickú koróziu (M = a * I * t) reprezentuje premenná 't':", a: ["A. Teplotu elektrolytu v stupňoch Celzia", "B. Čas pôsobenia prechádzajúceho jednosmerného prúdu", "C. Hrúbku pasivačnej vrstvy"], correct: 1, exp: "Hmotnosť vylúčeného kovu je priamo úmerná integrálu prúdu v čase.", test: 4 },
        { q: "⭐ Aká je maximálna povolená hodnota napäťovej nesymetrie pre bezproblémové pripojenie priemyselného zariadenia?", a: ["A. ± 10 %", "B. ± 2 %", "C. ± 5 %"], correct: 1, exp: "Hranica 2 % nesymetrie je kritériom kvality podľa pripojovacích podmienok distribučných sietí.", test: 4 }
    ];

    let currentQuestions = [];
    let currentIdx = 0;
    let score = 0;
    let answered = false;

    function startQuiz(testNumber) {
        currentQuestions = allQuestions.filter(q => q.test === testNumber);
        currentIdx = 0;
        score = 0;
        
        document.getElementById("menu-screen").classList.add("hidden");
        document.getElementById("result-screen").classList.add("hidden");
        document.getElementById("quiz-screen").classList.remove("hidden");
        
        let titleText = "Test " + testNumber;
        if(testNumber === 4) titleText = "Test 4: Otvorené otázky";
        document.getElementById("quiz-title").innerText = titleText;

        showQuestion();
    }

    function showQuestion() {
        answered = false;
        document.getElementById("explanation-box").classList.add("hidden");
        document.getElementById("next-btn").classList.add("hidden");

        const qData = currentQuestions[currentIdx];
        document.getElementById("progress").innerText = `Otázka ${currentIdx + 1} z ${currentQuestions.length}`;
        document.getElementById("question-text").innerText = qData.q;

        const optionsContainer = document.getElementById("options-container");
        optionsContainer.innerHTML = "";

        qData.a.forEach((option, index) => {
            const button = document.createElement("button");
            button.className = "option-btn";
            button.innerText = option;
            button.onclick = () => selectOption(index, button);
            optionsContainer.appendChild(button);
        });
    }

    function selectOption(selectedIndex, clickedButton) {
        if (answered) return;
        answered = true;

        const qData = currentQuestions[currentIdx];
        const buttons = document.querySelectorAll(".option-btn");

        buttons.forEach((btn, index) => {
            btn.disabled = true;
            if (index === qData.correct) {
                btn.classList.add("correct");
            }
        });

        if (selectedIndex === qData.correct) {
            score++;
        } else {
            clickedButton.classList.add("incorrect");
        }

        // Show explanation
        document.getElementById("explanation-text").innerText = qData.exp;
        document.getElementById("explanation-box").classList.remove("hidden");
        document.getElementById("next-btn").classList.remove("hidden");
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < currentQuestions.length) {
            showQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        document.getElementById("quiz-screen").classList.add("hidden");
        document.getElementById("result-screen").classList.remove("hidden");
        
        const scoreDisplay = document.getElementById("score-display");
        scoreDisplay.innerText = `${score} / ${currentQuestions.length}`;

        const feedback = document.getElementById("feedback-text");
        const percentage = (score / currentQuestions.length) * 100;

        if (percentage >= 90) {
            feedback.innerText = "Excelentný výkon! Na skúšku si pripravený špičkovo.";
            feedback.style.color = "var(--success)";
        } else if (percentage >= 70) {
            feedback.innerText = "Veľmi dobrý výsledok. Pár drobností ešte dollaď a máš áčko v vrecku.";
            feedback.style.color = "var(--text-main)";
        } else {
            feedback.innerText = "Chcelo by to ešte jedno opakovanie materiálov. Skús to znovu!";
            feedback.style.color = "var(--error)";
        }
    }

    function showMenu() {
        document.getElementById("result-screen").classList.add("hidden");
        document.getElementById("quiz-screen").classList.add("hidden");
        document.getElementById("menu-screen").classList.remove("hidden");
    }
</script>
